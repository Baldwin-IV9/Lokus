<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokus Pro | Loquendo Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --card: #111;
            --text: #eee;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 { font-weight: 900; font-size: 2rem; margin: 0; color: var(--accent); text-align: center; }
        .status { font-size: 0.7rem; text-align: center; color: #555; margin-bottom: 25px; letter-spacing: 1px; }

        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; color: #888; }

        select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea { height: 80px; resize: none; border-left: 3px solid var(--accent); }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .btn-add { background: var(--accent); color: #000; }
        .btn-play { background: #222; color: #fff; border: 1px solid #333; }
        .btn-download { background: #fff; color: #000; margin-top: 10px; }

        .btn:hover { opacity: 0.8; transform: scale(0.98); }

        .list {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .item {
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }

        .del { color: #ff4444; cursor: pointer; font-weight: bold; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div class="app">
    <h1>LOKUS PRO</h1>
    <div class="status">NEURAL ENGINE ACTIVE</div>

    <label>VOZ (ESTILO LOQUENDO)</label>
    <select id="voice">
        <option value="Jorge">Jorge (Castellano)</option>
        <option value="Juan">Juan (Mexicano)</option>
        <option value="Paulina">Paulina (Mexicana)</option>
        <option value="Monica">Monica (Española)</option>
    </select>

    <label>ESCRIBIR DIÁLOGO</label>
    <textarea id="input" placeholder="Qué onda we..."></textarea>
    
    <button class="btn btn-add" onclick="add()">AÑADIR A LA FILA</button>
    
    <div class="list" id="list"></div>

    <button class="btn btn-play" onclick="playAll()">REPRODUCIR TODO</button>
    <button class="btn btn-download" onclick="downloadAll()">DESCARGAR MP3</button>
</div>

<script>
    let dialogues = [];

    function add() {
        const text = document.getElementById('input').value;
        if (!text) return;
        dialogues.push(text);
        document.getElementById('input').value = '';
        render();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = dialogues.map((d, i) => `
            <div class="item">
                <span>${d.substring(0, 30)}${d.length > 30 ? '...' : ''}</span>
                <span class="del" onclick="remove(${i})">BORRAR</span>
            </div>
        `).join('');
    }

    function remove(i) {
        dialogues.splice(i, 1);
        render();
    }

    // Usamos StreamElements API para que suene pro y se pueda descargar
    function getAudioUrl(text) {
        const voice = document.getElementById('voice').value;
        return `https://api.streamelements.com/static-voices?voice=${voice}&text=${encodeURIComponent(text)}`;
    }

    function playAll() {
        if (dialogues.length === 0) return alert("Pon algo primero, we");
        const fullText = dialogues.join(". ");
        const audio = new Audio(getAudioUrl(fullText));
        audio.play();
    }

    async function downloadAll() {
        if (dialogues.length === 0) return alert("No hay nada que descargar");
        
        const fullText = dialogues.join(". ");
        const url = getAudioUrl(fullText);
        
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `lokus_audio_${Date.now()}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } catch (e) {
            alert("Error al descargar, intenta de nuevo.");
        }
    }
</script>

</body>
</html>
