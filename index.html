<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokus Ultimate | Loquendo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --accent: #00ffcc;
            --card: #121212;
            --btn-text: #000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border-radius: 24px;
            padding: 35px;
            border: 1px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        h1 { font-weight: 900; font-size: 2.2rem; margin: 0; color: var(--accent); text-align: center; letter-spacing: -1px; }
        .badge { font-size: 0.6rem; background: #222; color: var(--accent); padding: 4px 10px; border-radius: 50px; display: inline-block; margin-top: 5px; }
        .center { text-align: center; margin-bottom: 25px; }

        label { display: block; font-size: 0.7rem; font-weight: 700; margin-bottom: 8px; color: #666; text-transform: uppercase; }

        select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        select:focus, textarea:focus { border-color: var(--accent); outline: none; }
        textarea { height: 90px; resize: none; border-left: 4px solid var(--accent); font-size: 0.95rem; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-add { background: var(--accent); color: var(--btn-text); }
        .btn-play { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-dl { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .list {
            margin: 20px 0;
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .item {
            background: #181818;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border: 1px solid #222;
        }

        .del { color: #ff4444; cursor: pointer; font-size: 0.75rem; font-weight: 900; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="center">
        <h1>LOKUS PRO</h1>
        <div class="badge">V4.0 ULTIMATE ENGINE</div>
    </div>

    <label>Elegir Voz (Loquendo & Neural)</label>
    <select id="voice">
        <optgroup label="Español (Latinoamérica)">
            <option value="Miguel">Miguel (Mexicano)</option>
            <option value="Mia">Mia (Mexicana)</option>
            <option value="Penelope">Penélope (Americana)</option>
            <option value="Lupe">Lupe (Americana)</option>
        </optgroup>
        <optgroup label="Español (España)">
            <option value="Jorge" selected>Jorge (El Clásico)</option>
            <option value="Enrique">Enrique</option>
            <option value="Conchita">Conchita</option>
            <option value="Lucia">Lucía</option>
        </optgroup>
        <optgroup label="Inglés">
            <option value="Brian">Brian (Meme Voice)</option>
            <option value="Emma">Emma (Británica)</option>
            <option value="Joey">Joey (Americano)</option>
        </optgroup>
    </select>

    <label>Tu Diálogo</label>
    <textarea id="text" placeholder="Escribe lo que quieras que diga la voz, we..."></textarea>
    
    <button class="btn btn-add" onclick="add()">+ Añadir a la lista</button>
    
    <div class="list" id="queue"></div>

    <button class="btn btn-play" onclick="playAll()">Escuchar Preview</button>
    <button id="dlBtn" class="btn btn-dl" onclick="downloadMp3()">↓ DESCARGAR MP3</button>
</div>

<script>
    let lines = [];

    function add() {
        const t = document.getElementById('text').value;
        if (!t) return;
        lines.push(t);
        document.getElementById('text').value = '';
        render();
    }

    function render() {
        const q = document.getElementById('queue');
        q.innerHTML = lines.map((l, i) => `
            <div class="item">
                <span>${l.substring(0, 35)}${l.length > 35 ? '...' : ''}</span>
                <span class="del" onclick="remove(${i})">QUITAR</span>
            </div>
        `).join('');
    }

    function remove(i) {
        lines.splice(i, 1);
        render();
    }

    function getUrl() {
        const voice = document.getElementById('voice').value;
        const fullText = lines.join(". ");
        return `https://api.streamelements.com/static-voices?voice=${voice}&text=${encodeURIComponent(fullText)}`;
    }

    function playAll() {
        if (lines.length === 0) return alert("Primero añade diálogos, we");
        const audio = new Audio(getUrl());
        audio.play();
    }

    async function downloadMp3() {
        if (lines.length === 0) return alert("No hay nada que descargar, we");
        
        const btn = document.getElementById('dlBtn');
        btn.innerText = "PROCESANDO...";
        btn.style.opacity = "0.5";

        try {
            const res = await fetch(getUrl());
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lokus_${Date.now()}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } catch (err) {
            alert("Hubo un error con la descarga, we.");
        } finally {
            btn.innerText = "↓ DESCARGAR MP3";
            btn.style.opacity = "1";
        }
    }
</script>

</body>
</html>
