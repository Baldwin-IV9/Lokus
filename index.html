<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokus Pro | Voice Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card: rgba(255, 255, 255, 0.03);
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text: #f0f0f0;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #161b22, #0a0b10);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-weight: 800;
            letter-spacing: -2px;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to bottom right, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .tagline {
            text-align: center;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
        }

        select, textarea, input[type="range"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        select:focus, textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        textarea { height: 100px; resize: none; }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .dialogue-container {
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .dialogue-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delete-btn {
            color: #ff4b4b;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .delete-btn:hover { transform: scale(1.2); }

        /* Scrollbar pro */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>LOKUS PRO</h1>
    <div class="tagline">Neural Voice Engine</div>

    <div class="input-group">
        <label>SELECCIONAR VOZ</label>
        <select id="v"></select>
    </div>

    <div class="input-group" style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>VELOCIDAD</label>
            <input type="range" id="r" min="0.5" max="2" value="1" step="0.1">
        </div>
        <div style="flex: 1;">
            <label>TONO</label>
            <input type="range" id="p" min="0" max="2" value="1" step="0.1">
        </div>
    </div>

    <div class="input-group">
        <label>DIÁLOGO</label>
        <textarea id="t" placeholder="Escribe aquí, we..."></textarea>
    </div>

    <button class="btn btn-primary" onclick="add()">+ Añadir Diálogo</button>
    
    <div class="dialogue-container" id="l"></div>

    <button class="btn" style="background: white; color: black; margin-top: 20px;" onclick="run()">Reproducir Todo</button>
</div>

<script>
    const s = window.speechSynthesis;
    let vList = [];
    const dList = [];

    function load() {
        vList = s.getVoices();
        document.getElementById('v').innerHTML = vList
            .map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }

    if (s.onvoiceschanged !== undefined) s.onvoiceschanged = load;

    function add() {
        const txt = document.getElementById('t').value;
        if (!txt) return;
        dList.push(txt);
        document.getElementById('t').value = '';
        render();
    }

    function render() {
        document.getElementById('l').innerHTML = dList.map((d, i) => `
            <div class="dialogue-item">
                <span>${d.substring(0, 40)}${d.length > 40 ? '...' : ''}</span>
                <span class="delete-btn" onclick="del(${i})">×</span>
            </div>
        `).join('');
    }

    function del(i) { dList.splice(i, 1); render(); }

    async function run() {
        for (let t of dList) {
            await new Promise(res => {
                const u = new SpeechSynthesisUtterance(t);
                u.voice = vList[document.getElementById('v').value];
                u.rate = document.getElementById('r').value;
                u.pitch = document.getElementById('p').value;
                u.onend = res;
                s.speak(u);
            });
        }
    }
    load();
</script>

</body>
</html>
